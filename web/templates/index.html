<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomerPulse — Churn Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🔮 CustomerPulse</h1>
            <p class="subtitle">Customer Churn Prediction</p>
        </header>

        {% if not model_loaded %}
        <div class="alert alert-warning">
            ⚠️ No model loaded. Please run the Jupyter notebook first to train and save a model.
        </div>
        {% endif %}

        <!-- Prediction Form -->
        <form id="predictionForm" class="form-grid">
            <!-- Demographics -->
            <div class="section">
                <h2 class="section-title">👤 Demographics</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="SeniorCitizen">Senior Citizen</label>
                        <select id="SeniorCitizen" name="SeniorCitizen">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Partner">Partner</label>
                        <select id="Partner" name="Partner">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Dependents">Dependents</label>
                        <select id="Dependents" name="Dependents">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Account Info -->
            <div class="section">
                <h2 class="section-title">📋 Account Info</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tenure">Tenure (months)</label>
                        <input type="number" id="tenure" name="tenure" value="12" min="0" max="72">
                    </div>
                    <div class="form-group">
                        <label for="Contract">Contract</label>
                        <select id="Contract" name="Contract">
                            <option value="Month-to-month">Month-to-month</option>
                            <option value="One year">One year</option>
                            <option value="Two year">Two year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="PaperlessBilling">Paperless Billing</label>
                        <select id="PaperlessBilling" name="PaperlessBilling">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="PaymentMethod">Payment Method</label>
                        <select id="PaymentMethod" name="PaymentMethod">
                            <option value="Electronic check">Electronic check</option>
                            <option value="Mailed check">Mailed check</option>
                            <option value="Bank transfer (automatic)">Bank transfer</option>
                            <option value="Credit card (automatic)">Credit card</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="MonthlyCharges">Monthly Charges ($)</label>
                        <input type="number" id="MonthlyCharges" name="MonthlyCharges" value="70.00" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="TotalCharges">Total Charges ($)</label>
                        <input type="number" id="TotalCharges" name="TotalCharges" value="840.00" step="0.01" min="0">
                    </div>
                </div>
            </div>

            <!-- Services -->
            <div class="section">
                <h2 class="section-title">📡 Services</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="PhoneService">Phone Service</label>
                        <select id="PhoneService" name="PhoneService">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="MultipleLines">Multiple Lines</label>
                        <select id="MultipleLines" name="MultipleLines">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No phone service">No phone service</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="InternetService">Internet Service</label>
                        <select id="InternetService" name="InternetService">
                            <option value="DSL">DSL</option>
                            <option value="Fiber optic">Fiber optic</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="OnlineSecurity">Online Security</label>
                        <select id="OnlineSecurity" name="OnlineSecurity">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="OnlineBackup">Online Backup</label>
                        <select id="OnlineBackup" name="OnlineBackup">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="DeviceProtection">Device Protection</label>
                        <select id="DeviceProtection" name="DeviceProtection">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="TechSupport">Tech Support</label>
                        <select id="TechSupport" name="TechSupport">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="StreamingTV">Streaming TV</label>
                        <select id="StreamingTV" name="StreamingTV">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="StreamingMovies">Streaming Movies</label>
                        <select id="StreamingMovies" name="StreamingMovies">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                            <option value="No internet service">No internet</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-predict" {% if not model_loaded %}disabled{% endif %}>
                🔮 Predict Churn
            </button>
        </form>

        <!-- Result -->
        <div id="result" class="result-card" style="display: none;">
            <h2>Prediction Result</h2>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const btn = this.querySelector('.btn-predict');
            btn.textContent = '⏳ Predicting...';
            btn.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                const resultDiv = document.getElementById('result');
                const resultContent = document.getElementById('resultContent');

                resultContent.innerHTML = `
                    <div class="result-prediction">${data.prediction}</div>
                    <div class="result-stats">
                        <div class="stat">
                            <span class="stat-label">Churn Probability</span>
                            <span class="stat-value">${data.churn_probability}%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Risk Level</span>
                            <span class="stat-value" style="color: ${data.risk_color}">${data.risk_level}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${data.churn_probability}%; background: ${data.risk_color}"></div>
                    </div>
                `;

                resultDiv.style.display = 'block';
                resultDiv.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert('Request failed: ' + err.message);
            } finally {
                btn.textContent = '🔮 Predict Churn';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
